name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r technique/scripts/requirements.txt

      - name: Lint
        run: |
          ruff check technique/scripts technique/adapters technique/tests

      - name: Run tests
        run: |
          pytest -q

      - name: Validate schemas
        run: |
          python technique/scripts/valider_schemas.py
